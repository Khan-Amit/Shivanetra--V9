            transition: all 0.2s;

        .result { margin-top: 20px; display: none; }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            gap: 10px;

            font-size: 24px;

        }

            <select id="gender">

                <option value="female">♀ Female</option>

        let lastResult = null;
        
        async function calculate() {
            const name = document.getElementById('name').value;
            const day = document.getElementById('day').value;
            const month = document.getElementById('month').value;
            const year = document.getElementById('year').value;
            const gender = document.getElementById('gender').value;
            
            if (!name || !day || !month || !year) {
                alert('Please fill all fields');
                return;
            }
            
            const response = await fetch('/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name, day: parseInt(day), month: parseInt(month), 
                    year: parseInt(year), gender
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                lastResult = result;
                displayResult(result);
            } else {
                alert('Error: ' + (result.error || 'Unknown error'));
            }
        }

            const grid = result.loShu.grid;
            const missing = result.loShu.missingNumbers;

                    <div class="preview-grid">

                    </div>
                    <p><strong>Ruling Number:</strong> ${result.loShu.rulingNumber}</p>

                    <p><strong>Kua:</strong> ${result.kua.kua} (${result.kua.group} Group)</p>
                    <p><strong>Success:</strong> ${result.kua.directions.success} | <strong>Health:</strong> ${result.kua.directions.health}</p>
                    <p><strong>Romance:</strong> ${result.kua.directions.romance} | <strong>Personal:</strong> ${result.kua.directions.personal}</p>
                    
                    <hr>

                    <p><strong>Number:</strong> ${result.kabbalah.kabbalahNumber}</p>

                    <p><strong>Destiny:</strong> ${result.kundalini.destiny.number} (${result.kundalini.destiny.body})</p>
                    <p><strong>Path:</strong> ${result.kundalini.path.number} (${result.kundalini.path.body})</p>
                    
                    <button class="download-btn" onclick="downloadReport()">📥 Download Full Report (HTML)</button>
                </div>
            `;
            
            document.getElementById('result').innerHTML = html;
            document.getElementById('result').style.display = 'block';
        }
        
        function downloadReport() {
            if (!lastResult) return;
            
            const name = document.getElementById('name').value;
            const day = document.getElementById('day').value;
            const month = document.getElementById('month').value;
            const year = document.getElementById('year').value;
            const gender = document.getElementById('gender').value;
            
            const reportHTML = generateFullReport(lastResult, name, {day, month, year}, gender);
            const blob = new Blob([reportHTML], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `shivanetra_report_${name.replace(/\s/g, '_')}.html`;
            link.click();
            URL.revokeObjectURL(link.href);
        }
