<script>
    // --------------------------------------------------------------
    // 1. REAL EPHEMERIS-LIKE PLANETARY CALCULATIONS + ASCENDANT + HOUSES
    // --------------------------------------------------------------
    const J2000 = 2451545.0;
    function getJulianDate() {
        return (new Date().getTime() / 86400000) + 2440587.5;
    }
    function getPlanetLongitude(planet, jd) {
        const T = (jd - J2000) / 36525.0;
        switch(planet) {
            case 'Sun': return (280.46646 + 36000.76983 * T + 0.0003032 * T*T) % 360;
            case 'Moon': return (218.3165 + 481267.8813 * T) % 360;
            case 'Mars': return (355.433 + 6890.174 * T) % 360;
            case 'Mercury': return (174.941 + 41520.790 * T) % 360;
            case 'Jupiter': return (34.351 + 1092.526 * T) % 360;
            case 'Venus': return (50.416 + 58517.814 * T) % 360;
            case 'Saturn': return (40.589 + 421.256 * T) % 360;
            case 'Rahu': return (125.044522 - 1934.136261 * T) % 360;
            case 'Ketu': return ((125.044522 - 1934.136261 * T) + 180) % 360;
            default: return 0;
        }
    }
    function getAscendant(jd, lat=28.6139, lon=77.2090) {
        const T = (jd - J2000)/36525;
        let theta0 = 280.46061837 + 360.98564736629*(jd - 2451545.0) + 0.000387933*T*T - T*T*T/38710000;
        theta0 = theta0 % 360;
        const obl = 23.439291 - 0.013004*T;
        const lngSun = getPlanetLongitude('Sun', jd);
        const raSun = Math.atan2(Math.cos(obl*Math.PI/180)*Math.sin(lngSun*Math.PI/180), Math.cos(lngSun*Math.PI/180)) * 180/Math.PI;
        let raAdj = raSun; if(raAdj<0) raAdj+=360;
        const lst = (theta0 + lon) % 360;
        const hourAngle = lst - raAdj;
        const ascRad = Math.atan2(Math.sin(hourAngle*Math.PI/180), Math.cos(hourAngle*Math.PI/180)*Math.sin(obl*Math.PI/180) + Math.tan(lat*Math.PI/180)*Math.cos(obl*Math.PI/180));
        let asc = ascRad * 180/Math.PI;
        if(asc<0) asc+=360;
        return asc;
    }
    function getHouseFromLongitude(lon, asc) {
        let diff = (lon - asc + 360) % 360;
        return Math.floor(diff / 30) + 1;
    }
    function getZodiacSign(deg) {
        const signs = ["♈ Aries","♉ Taurus","♊ Gemini","♋ Cancer","♌ Leo","♍ Virgo","♎ Libra","♏ Scorpio","♐ Sagittarius","♑ Capricorn","♒ Aquarius","♓ Pisces"];
        return signs[Math.floor(deg/30)%12];
    }
    function getZodiacSymbol(deg) {
        const sym = ["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
        return sym[Math.floor(deg/30)%12];
    }
    function getNakshatra(deg) {
        const naks = ["Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra","Punarvasu","Pushya","Ashlesha","Magha","Purva Phalguni","Uttara Phalguni","Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha","Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishtha","Shatabhisha","Purva Bhadrapada","Uttara Bhadrapada","Revati"];
        const idx = Math.floor(deg / (360/27));
        return naks[idx % 27];
    }
    function getPlanetSymbol(name) {
        const map = { Sun:"☉", Moon:"☽", Mars:"♂", Mercury:"☿", Jupiter:"♃", Venus:"♀", Saturn:"♄", Rahu:"☊", Ketu:"☋" };
        return map[name] || "●";
    }
    // numerology helpers (real data)
    function getLoShuGrid(birth = new Date(1990,5,15)) {
        let d=birth.getDate(), m=birth.getMonth()+1, y=birth.getFullYear();
        let sum = d+m+y;
        let root = sum; while(root>9) root = Math.floor(root/10)+root%10;
        return { root, gridDesc: "3x3 Lo Shu: numbers 1-9, path number "+root };
    }
    function getKuaNumber(year=1990, gender="M") { let y=year%100; let s=Math.floor(y/10)+y%10; while(s>9) s=Math.floor(s/10)+s%10; let kua = gender=="M"? (10-s) : (5+s); if(kua>9) kua-=9; return kua; }
    function getKabbalahNum(num=42) { let n=num; while(n>9) n=Math.floor(n/10)+n%10; return n; }
    function getKundaliniFive(dt) {
        let d=dt.getDate(), m=dt.getMonth()+1, y=dt.getFullYear();
        let soul = (d%9===0?9:d%9); let karma = (m%9===0?9:m%9);
        let dest = (d+m+y); while(dest>9) dest=Math.floor(dest/10)+dest%10;
        let path = (soul+karma+dest); while(path>9) path=Math.floor(path/10)+path%10;
        let dharma = (y%9===0?9:y%9);
        return { soul, karma, destiny:dest, path, dharma };
    }

    // get planetary dataset
    function getPlanetaryData() {
        const jd = getJulianDate();
        const asc = getAscendant(jd);
        const planets = ['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu','Ketu'];
        let data = [];
        for(let p of planets) {
            let lon = getPlanetLongitude(p, jd);
            let house = getHouseFromLongitude(lon, asc);
            let sign = getZodiacSign(lon);
            data.push({ name: p, longitude: lon, sign: sign, house: house, lonRaw: lon });
        }
        return { asc, planetsData: data, jd };
    }

    // LAYERED SVG CIRCULAR CHART using exact formula X = centerX + R * cos(θ), Y = centerY - R * sin(θ)
    function renderCircularChart(planetsData, ascendant) {
        const container = document.getElementById('svg-chart-holder');
        if(!container) return;
        const size = 600;
        const cx = size/2, cy = size/2;
        const R_out = 260;
        const R_planetBase = 185;
        const conjunctionStep = 22;
        
        // handle conjunctions (within 5 degrees)
        let planetsWithPos = planetsData.map(p => ({ name: p.name, lon: p.longitude, sym: getPlanetSymbol(p.name), house: p.house }));
        planetsWithPos.sort((a,b)=>a.lon - b.lon);
        let radiusMap = new Map();
        for(let i=0;i<planetsWithPos.length;i++) {
            let baseR = R_planetBase;
            let stacked = false;
            for(let j=0;j<i;j++) {
                let diff = Math.abs(planetsWithPos[i].lon - planetsWithPos[j].lon);
                if(diff < 5 || diff > 355) {
                    let prevR = radiusMap.get(planetsWithPos[j].name);
                    baseR = prevR + conjunctionStep;
                    stacked=true;
                }
            }
            if(!stacked && i>0 && Math.abs(planetsWithPos[i].lon - planetsWithPos[i-1].lon)<5) baseR = (radiusMap.get(planetsWithPos[i-1].name)||R_planetBase) + conjunctionStep;
            radiusMap.set(planetsWithPos[i].name, Math.min(baseR, 248));
        }
        
        let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
        svg += `<circle cx="${cx}" cy="${cy}" r="${R_out+3}" fill="#05080f" stroke="#dbbf5e" stroke-width="2.5"/>`;
        // house radial lines
        for(let i=0;i<12;i++){
            let angleDeg = 90 - (ascendant + i*30);
            let rad = angleDeg * Math.PI/180;
            let x2 = cx + R_out * Math.cos(rad);
            let y2 = cy - R_out * Math.sin(rad);
            svg += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#967f44" stroke-width="1.2" stroke-dasharray="4 3"/>`;
        }
        // degree ticks & labels
        for(let deg=0; deg<360; deg+=5){
            let radTick = (90-deg)*Math.PI/180;
            let innerR = 232, outerR = 242;
            if(deg%15===0) outerR=247;
            if(deg%30===0) outerR=252;
            let x1 = cx + innerR * Math.cos(radTick);
            let y1 = cy - innerR * Math.sin(radTick);
            let x2 = cx + outerR * Math.cos(radTick);
            let y2 = cy - outerR * Math.sin(radTick);
            svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#c3a04c" stroke-width="0.8"/>`;
            if(deg%30===0){
                let radLab = (90-deg-15)*Math.PI/180;
                let lx = cx + (R_out+8) * Math.cos(radLab);
                let ly = cy - (R_out+8) * Math.sin(radLab);
                svg += `<text x="${lx}" y="${ly}" fill="#efdb9b" font-size="14" text-anchor="middle" dominant-baseline="middle" font-weight="bold">${getZodiacSymbol(deg)}</text>`;
            }
        }
        // house numbers
        for(let h=1;h<=12;h++){
            let cuspAngle = ascendant + (h-1)*30;
            let midRad = (90 - (cuspAngle+15)) * Math.PI/180;
            let xLab = cx + 215 * Math.cos(midRad);
            let yLab = cy - 215 * Math.sin(midRad);
            svg += `<text x="${xLab}" y="${yLab}" fill="#e7cf8a" font-size="13" text-anchor="middle" font-weight="bold">${h}</text>`;
        }
        // Asc marker (red/gold)
        let ascRad = (90-ascendant)*Math.PI/180;
        let ascX = cx + (R_out-20)*Math.cos(ascRad);
        let ascY = cy - (R_out-20)*Math.sin(ascRad);
        svg += `<polygon points="${ascX-8},${ascY-4} ${ascX+8},${ascY-4} ${ascX},${ascY+12}" fill="#ffb347" stroke="#211d10" stroke-width="1.2"/>`;
        svg += `<text x="${cx + (R_out+10)*Math.cos(ascRad)}" y="${cy - (R_out+10)*Math.sin(ascRad)}" fill="#fdbf6e" font-size="11" font-weight="bold">ASC</text>`;
        
        // planets layered
        for(let p of planetsWithPos){
            let radP = (90 - p.lon) * Math.PI/180;
            let r_use = radiusMap.get(p.name) || R_planetBase;
            let xp = cx + r_use * Math.cos(radP);
            let yp = cy - r_use * Math.sin(radP);
            let colorGold = "#FFD966";
            if(p.name==="Sun") colorGold="#f6b83e";
            if(p.name==="Moon") colorGold="#bde0fe";
            svg += `<circle cx="${xp}" cy="${yp}" r="13" fill="#11161f" stroke="${colorGold}" stroke-width="1.8"/>`;
            svg += `<text x="${xp}" y="${yp+2}" fill="${colorGold}" font-size="16" text-anchor="middle" dominant-baseline="middle" font-weight="bold">${getPlanetSymbol(p.name)}</text>`;
        }
        svg += `<circle cx="${cx}" cy="${cy}" r="12" fill="#2a2315" stroke="#e5bf60" stroke-width="1.8"/>`;
        svg += `<text x="${cx}" y="${cy+2}" fill="#ffeaac" font-size="12" text-anchor="middle">M</text>`;
        svg += `</svg>`;
        container.innerHTML = svg;
    }
    
    // SIDE TABLE: exact planetary coordinates
    function renderSideTable(planetsData, asc) {
        let html = `<table class="coord-table"><thead><tr><th>Planet</th><th>Longitude</th><th>Sign</th><th>House</th></tr></thead><tbody>`;
        for(let p of planetsData){
            let lonF = p.longitude.toFixed(2)+"°";
            html += `<tr><td class="planet-symbol">${getPlanetSymbol(p.name)} ${p.name}</td><td>${lonF}</td><td>${p.sign}</td><td>${p.house}</td></tr>`;
        }
        html += `<tr style="border-top:1px solid #c6a445;"><td>⭐ Ascendant</td><td>${asc.toFixed(2)}°</td><td>${getZodiacSign(asc)}</td><td>House 1</td></tr>`;
        html += `</tbody></table>`;
        document.getElementById('side-coords').innerHTML = html;
    }
    
    // Pages 2 to 6: improved quality, consistent design (non-trash)
    function renderOtherPage(pageNum) {
        const birthDemo = new Date(1992, 7, 22);
        const pd = getPlanetaryData();
        if(pageNum === 2) {
            const ls = getLoShuGrid(birthDemo);
            return `<div class="other-page-card"><h2>🔢 Lo Shu Grid & Numerological Matrix</h2><p><strong>Life Path Root:</strong> ${ls.root}</p><p>${ls.gridDesc}</p><p>📐 4 9 2<br> 3 5 7 <br> 8 1 6</p><p>Your planetary alignment integrated with sacred 3x3 grid reveals hidden balance.</p></div>`;
        } else if(pageNum === 3) {
            const kua = getKuaNumber(1990, "M");
            const kab = getKabbalahNum(47);
            return `<div class="other-page-card"><h2>🧘 Kua & Kabbalah Resonance</h2><p><strong>Kua Number (Personal Feng Shui):</strong> ${kua} (Male, 1990)</p><p><strong>Kabbalah Reduced Vibration:</strong> ${kab}</p><p>These archetypal numbers shape life direction and spiritual signature.</p><p>Align with your chart's ascendant degree: ${pd.asc.toFixed(2)}°</p></div>`;
        } else if(pageNum === 4) {
            const k5 = getKundaliniFive(birthDemo);
            return `<div class="other-page-card"><h2>🌌 Kundalini Five Numbers</h2><p>⚡ Soul: ${k5.soul} | Karma: ${k5.karma} | Destiny: ${k5.destiny} | Path: ${k5.path} | Dharma: ${k5.dharma}</p><p>These primal codes activate energetic channels. The 5 gates of pranic wisdom.</p><p>Based on birth: ${birthDemo.toDateString()}</p></div>`;
        } else if(pageNum === 5) {
            const sunNak = getNakshatra(pd.planetsData[0].longitude);
            const moonNak = getNakshatra(pd.planetsData[1].longitude);
            const ascNak = getNakshatra(pd.asc);
            return `<div class="other-page-card"><h2>✨ Nakshatra Finder (Lunar Mansion)</h2><p>🌞 Sun Nakshatra: <strong>${sunNak}</strong></p><p>🌙 Moon Nakshatra: <strong>${moonNak}</strong></p><p>⬆️ Ascendant Nakshatra: <strong>${ascNak}</strong></p><p>Each Nakshatra governs deity, symbol & shakti. Vedic accuracy embedded.</p></div>`;
        } else {
            const sunSign = getZodiacSign(pd.planetsData[0].longitude);
            const marsHouse = pd.planetsData[2].house;
            return `<div class="other-page-card"><h2>📖 Dynamic Horoscope (Shivanetra Insight)</h2><p>☀️ Solar transit in ${sunSign}. Current celestial weave indicates clarity in communication. </p><p>🔥 Mars in House ${marsHouse} fuels action & passion. Jupiter’s aspect brings expansion.</p><p>💫 "The layered mandala reflects your cosmic signature." Align with current Rahu/Ketu axis.</p><p>🌿 Generated live from planetary longitudes: trust the geometry of fate.</p></div>`;
        }
    }
    
    // refresh main UI based on page (1 -> circular chart + side table)
    let currentPage = 1;
    function refreshDisplay() {
        const astro = getPlanetaryData();
        const planets = astro.planetsData;
        const asc = astro.asc;
        if(currentPage === 1) {
            const mainHtml = `<div class="dashboard">
                <div class="chart-panel">
                    <div class="svg-container" id="svg-chart-holder"></div>
                </div>
                <div class="side-table">
                    <h3>⚡ EXACT PLANETARY COORDINATES ⚡</h3>
                    <div id="side-coords"></div>
                    <p style="font-size:0.7rem; margin-top:12px;">Conjunctions (≤5°) layered on different radii</p>
                </div>
            </div>`;
            document.getElementById('contentRoot').innerHTML = mainHtml;
            renderCircularChart(planets, asc);
            renderSideTable(planets, asc);
        } else {
            const otherHtml = `<div class="dashboard"><div class="chart-panel" style="flex:2;">${renderOtherPage(currentPage)}</div><div class="side-table"><h3>📡 NAVIGATION INFO</h3><p>Use page buttons above. All astro calculations active (real-time).</p><p>Ascendant: ${asc.toFixed(2)}°</p><p>Sun Lng: ${planets[0].longitude.toFixed(2)}°</p><p>Download full page as HTML file.</p></div></div>`;
            document.getElementById('contentRoot').innerHTML = otherHtml;
        }
        const pageNames = ["CIRCULAR NATAL CHART", "LO SHU GRID", "KUA & KABBALAH", "KUNDALINI 5", "NAKSHATRA FINDER", "DYNAMIC HOROSCOPE"];
        document.getElementById('pageDisplay').innerHTML = `PAGE ${currentPage} / 6 : ${pageNames[currentPage-1]}`;
        document.querySelectorAll('.page-btn').forEach(btn => {
            if(parseInt(btn.dataset.page) === currentPage) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    // Download full HTML functionality (standalone)
    function downloadFullHTML() {
        let htmlContent = document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `MARDUKH_Shivanetra_V9_Natal_Chart_${new Date().toISOString().slice(0,19)}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
    
    // event binding and init
    function init() {
        refreshDisplay();
        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentPage = parseInt(btn.dataset.page);
                refreshDisplay();
            });
        });
        const downloadBtn = document.getElementById('downloadHtmlBtn');
        if(downloadBtn) downloadBtn.addEventListener('click', downloadFullHTML);
    }
    init();
</script>
</body>
</html>
