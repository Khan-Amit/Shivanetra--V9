<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MARDUKH SYSTEM™ – Shivanetra V9 | Layered Circular Natal Chart</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none; /* better UI for buttons */
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', 'Roboto', 'Corbel', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* main app card */
        .marduk-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(10, 14, 23, 0.75);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 2px #d4af37 inset, 0 0 0 5px rgba(212,175,55,0.2);
            padding: 1.2rem;
        }

        /* header branding */
        .branding {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            border-bottom: 2px solid #d4af37;
            margin-bottom: 1.2rem;
            padding-bottom: 0.5rem;
        }
        .system-title {
            font-size: 1.9rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f9e0a0, #c9a52c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
        .version {
            color: #b9a46b;
            font-family: monospace;
            font-weight: bold;
        }
        .license {
            font-size: 0.7rem;
            color: #7f8c8d;
            text-align: right;
        }

        /* 6-page navigation */
        .nav-pages {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #11161fcc;
            border-radius: 60px;
            padding: 0.4rem 0.8rem;
            margin-bottom: 1.5rem;
            gap: 10px;
            flex-wrap: wrap;
        }
        .page-btn {
            background: #1e2a36;
            border: none;
            color: #eedb9b;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            box-shadow: 0 2px 5px black;
        }
        .page-btn.active {
            background: #d4af37;
            color: #0a0a1a;
            box-shadow: 0 0 8px gold;
        }
        .page-btn:hover:not(.active) {
            background: #3a4c5e;
            color: white;
        }
        .page-indicator {
            font-size: 0.9rem;
            background: #00000066;
            padding: 5px 12px;
            border-radius: 40px;
            color: #e0c87c;
        }

        /* main two-column: chart + side table */
        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
        }
        .chart-panel {
            flex: 2;
            min-width: 320px;
            background: #03060cb3;
            border-radius: 2rem;
            padding: 0.8rem;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 0 1px #4a3e1f;
        }
        .svg-container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        svg {
            background: #020408;
            border-radius: 50%;
            box-shadow: 0 0 0 3px #2a2416, 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            height: auto;
            max-width: 650px;
        }
        .side-table {
            flex: 1;
            min-width: 260px;
            background: #0e131fdb;
            border-radius: 1.5rem;
            padding: 1rem;
            backdrop-filter: blur(8px);
            border: 1px solid #d4af3766;
        }
        .side-table h3 {
            text-align: center;
            color: #f3d572;
            margin-top: 0;
            border-bottom: 1px solid #6a5a2e;
            display: inline-block;
            width: 100%;
        }
        .coord-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            color: #f0efef;
        }
        .coord-table th, .coord-table td {
            padding: 6px 4px;
            border-bottom: 1px solid #2f3542;
            text-align: left;
        }
        .coord-table th {
            color: #dbbf6e;
            font-weight: 600;
        }
        .planet-symbol {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .asc-marker {
            color: #ffb347;
        }
        footer {
            margin-top: 1.8rem;
            text-align: center;
            font-size: 0.7rem;
            color: #6c757d;
            border-top: 1px solid #2a2f3a;
            padding-top: 0.8rem;
        }
        @media (max-width: 780px) {
            .dashboard { flex-direction: column; }
            .page-btn { padding: 5px 12px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
<div class="marduk-container">
    <div class="branding">
        <span class="system-title">⚡ MARDUKH SYSTEM™ ⚡</span>
        <span class="version">Shivanetra V9 · Layered Circular Chart</span>
        <div class="license">Seliim Ahmed / amit.khanna.1082@gmail.com</div>
    </div>

    <!-- 6-page interface (preserved) -->
    <div class="nav-pages">
        <button class="page-btn" data-page="1">📜 Chart</button>
        <button class="page-btn" data-page="2">🔢 Lo Shu Grid</button>
        <button class="page-btn" data-page="3">🧘 Kua & Kabbalah</button>
        <button class="page-btn" data-page="4">🌌 Kundalini 5 Num</button>
        <button class="page-btn" data-page="5">✨ Nakshatra Finder</button>
        <button class="page-btn" data-page="6">📖 Dynamic Horoscope</button>
        <div class="page-indicator" id="pageDisplay">Page 1 / 6 : Circular Chart</div>
    </div>

    <!-- dynamic content area: pages 2-6 also work but we show chart on page1 -->
    <div id="contentRoot">
        <!-- chart+sidebar will be injected by JS for page 1, other pages separate -->
    </div>
    <footer>© MARDUKH SYSTEM™ — Sovereign Proprietary License | Natal Engine with Layered SVG | Exact Degree Geometry</footer>
</div>

<script>
    // --------------------------------------------------------------
    // 1. REAL PLANETARY CALCULATIONS (simplified but accurate longitudes)
    //    Based on fixed epoch simulation (modern ephemeris style - testable)
    //    All planets, Ascendant, houses, nakshatra, numerology, kundalini etc.
    // --------------------------------------------------------------
    const J2000 = 2451545.0;
    function getJulianDate() {
        return (new Date().getTime() / 86400000) + 2440587.5;
    }
    // mean longitude approximations (degree)
    function getPlanetLongitude(planet, jd) {
        const T = (jd - J2000) / 36525.0;
        switch(planet) {
            case 'Sun': return (280.46646 + 36000.76983 * T + 0.0003032 * T*T) % 360;
            case 'Moon': return (218.3165 + 481267.8813 * T) % 360;
            case 'Mars': return (355.433 + 6890.174 * T) % 360;
            case 'Mercury': return (174.941 + 41520.790 * T) % 360;
            case 'Jupiter': return (34.351 + 1092.526 * T) % 360;
            case 'Venus': return (50.416 + 58517.814 * T) % 360;
            case 'Saturn': return (40.589 + 421.256 * T) % 360;
            case 'Rahu': return (125.044522 - 1934.136261 * T) % 360; // Mean node
            case 'Ketu': return ( (125.044522 - 1934.136261 * T) + 180 ) % 360;
            default: return 0;
        }
    }
    // ascendant: based on local sidereal time approximation (Greenwich + offset)
    function getAscendant(jd, lat=28.6139, lon=77.2090) {
        const T = (jd - J2000)/36525;
        let theta0 = 280.46061837 + 360.98564736629*(jd - 2451545.0) + 0.000387933*T*T - T*T*T/38710000;
        theta0 = theta0 % 360;
        const obl = 23.439291 - 0.013004*T;
        const lngSun = getPlanetLongitude('Sun', jd);
        const raSun = Math.atan2(Math.cos(obl*Math.PI/180)*Math.sin(lngSun*Math.PI/180), Math.cos(lngSun*Math.PI/180)) * 180/Math.PI;
        let raAdj = raSun; if(raAdj<0) raAdj+=360;
        const lst = (theta0 + lon) % 360;
        const hourAngle = lst - raAdj;
        const ascRad = Math.atan2(Math.sin(hourAngle*Math.PI/180), Math.cos(hourAngle*Math.PI/180)*Math.sin(obl*Math.PI/180) + Math.tan(lat*Math.PI/180)*Math.cos(obl*Math.PI/180));
        let asc = ascRad * 180/Math.PI;
        if(asc<0) asc+=360;
        return asc;
    }
    // house cusps: simple equal house system (ascendant as 1st cusp)
    function getHouseCusp(asc, houseNum) {
        return (asc + (houseNum-1)*30) % 360;
    }
    function getHouseFromLongitude(lon, asc) {
        let diff = (lon - asc + 360) % 360;
        return Math.floor(diff / 30) + 1;
    }
    function getZodiacSign(deg) {
        const signs = ["♈ Aries","♉ Taurus","♊ Gemini","♋ Cancer","♌ Leo","♍ Virgo","♎ Libra","♏ Scorpio","♐ Sagittarius","♑ Capricorn","♒ Aquarius","♓ Pisces"];
        return signs[Math.floor(deg/30)%12];
    }
    function getZodiacSymbol(deg) {
        const sym = ["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
        return sym[Math.floor(deg/30)%12];
    }
    function getNakshatra(deg) {
        const naks = ["Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra","Punarvasu","Pushya","Ashlesha","Magha","Purva Phalguni","Uttara Phalguni","Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha","Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishtha","Shatabhisha","Purva Bhadrapada","Uttara Bhadrapada","Revati"];
        const idx = Math.floor(deg / (360/27));
        return naks[idx % 27];
    }
    // Numerology: Lo Shu Grid, Kua, Kabbalah (simple)
    function getLoShuGridFromBirth(birthDate = new Date(1990,5,15)) {
        let sum = birthDate.getDate() + (birthDate.getMonth()+1) + birthDate.getFullYear();
        let digits = sum.toString().split('').map(Number);
        while(digits.length>1 && digits.reduce((a,b)=>a+b,0)>=10) digits = [digits.reduce((a,b)=>a+b,0)];
        let root = digits.reduce((a,b)=>a+b,0);
        return { root: root, grid: "3x3 Lo Shu: center 5, even/odd patterns" };
    }
    function getKuaNumber(gender="M", year=1990) { let y=year%100; let sum=Math.floor(y/10)+y%10; while(sum>9) sum=Math.floor(sum/10)+sum%10; let kua = gender=="M"? (10-sum): (5+sum); if(kua>9) kua-=9; return kua; }
    function getKabbalahReduction(num) { while(num>9) num=Math.floor(num/10)+num%10; return num; }
    function getKundaliniFiveNumbers(dt) {
        let d=dt.getDate(), m=dt.getMonth()+1, y=dt.getFullYear();
        let soul = getKabbalahReduction(d);
        let karma = getKabbalahReduction(m);
        let destiny = getKabbalahReduction(d+m+y);
        let path = getKabbalahReduction(soul+karma+destiny);
        let dharma = getKabbalahReduction(y);
        return { soul, karma, destiny, path, dharma };
    }

    // generate planetary data for current time
    function getPlanetaryData() {
        const jd = getJulianDate();
        const asc = getAscendant(jd);
        const planets = ['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu','Ketu'];
        let data = [];
        for(let p of planets) {
            let lon = getPlanetLongitude(p, jd);
            let house = getHouseFromLongitude(lon, asc);
            let sign = getZodiacSign(lon);
            data.push({ name: p, longitude: lon, sign: sign, house: house, lonRaw: lon });
        }
        return { asc, planetsData: data, jd, ascendantHouse: 1 };
    }

    // ---- SVG LAYERED CIRCULAR CHART ----
    function renderCircularChart(planetsData, ascendant) {
        const container = document.getElementById('svg-chart-holder');
        if(!container) return;
        const size = 600;
        const centerX = size/2, centerY = size/2;
        const R_out = 260;
        const R_inner = 40;
        const R_houseLabels = 220;
        const R_zodiacRing = 245;
        const R_degTicks = 235;
        const R_planetBase = 190;
        const conjunctionOffset = 18; // radius step for conjunctions
        
        // group conjunctions: planets within 5°
        let planetPositions = planetsData.map(p => ({ name: p.name, lon: p.longitude, sym: getPlanetSymbol(p.name), house: p.house }));
        planetPositions.sort((a,b)=>a.lon - b.lon);
        let radiusMap = new Map();
        for(let i=0; i<planetPositions.length; i++) {
            let baseR = R_planetBase;
            let collision = false;
            for(let j=0; j<i; j++) {
                let diff = Math.abs(planetPositions[i].lon - planetPositions[j].lon);
                if(diff < 5 || diff > 355) { // conjunction
                    if(radiusMap.has(planetPositions[j].name)) {
                        let usedR = radiusMap.get(planetPositions[j].name);
                        baseR = usedR + conjunctionOffset;
                        collision=true;
                    } else {
                        baseR = R_planetBase + conjunctionOffset;
                    }
                }
            }
            if(!collision && radiusMap.size && [...radiusMap.values()].some(v=> v === baseR && Math.abs(planetPositions[i].lon - planetPositions.find(p=>radiusMap.get(p.name)===baseR)?.lon)<5)) baseR+=conjunctionOffset;
            radiusMap.set(planetPositions[i].name, Math.min(baseR, 240));
        }
        
        let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
        svg += `<circle cx="${centerX}" cy="${centerY}" r="${R_out+4}" fill="#010101" stroke="#c9aa3f" stroke-width="2"/>`;
        // zodiac background subtle
        for(let i=0;i<12;i++){
            let startAng = 90 - (i*30); // 0° Aries at top? Astro: 0° Aries East? but standard circular: 0° at 3 o'clock, we adjust to make asc marker consistent. However simplest: angle offset to put asc at "top"? We'll place 0° at right side (3 o'clock). Asc marker custom.
            let angStart = (90 - (i*30)) * Math.PI/180;
            let angEnd = (90 - ((i+1)*30)) * Math.PI/180;
            // optional segments
        }
        // house divisions (radial lines) from center to outer
        for(let i=0;i<12;i++){
            let angleDeg = 90 - (ascendant + i*30);
            let rad = angleDeg * Math.PI/180;
            let x2 = centerX + R_out * Math.cos(rad);
            let y2 = centerY - R_out * Math.sin(rad);
            svg += `<line x1="${centerX}" y1="${centerY}" x2="${x2}" y2="${y2}" stroke="#5f4c2b" stroke-width="1.2" stroke-dasharray="3 3"/>`;
        }
        // outer ring & degree ticks
        for(let deg=0; deg<360; deg+=5){
            let rad = (90-deg)*Math.PI/180;
            let innerR = R_degTicks, outerR = R_degTicks+ (deg%30===0? 8:4);
            let x1 = centerX + innerR * Math.cos(rad);
            let y1 = centerY - innerR * Math.sin(rad);
            let x2 = centerX + outerR * Math.cos(rad);
            let y2 = centerY - outerR * Math.sin(rad);
            svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#b89a48" stroke-width="0.8"/>`;
            if(deg%30===0){
                let labelRad = (90-deg-15)*Math.PI/180;
                let lx = centerX + (R_zodiacRing+10)*Math.cos(labelRad);
                let ly = centerY - (R_zodiacRing+10)*Math.sin(labelRad);
                let sym = getZodiacSymbol(deg);
                svg += `<text x="${lx}" y="${ly}" fill="#e7cf87" font-size="14" text-anchor="middle" dominant-baseline="middle" font-weight="bold">${sym}</text>`;
            }
        }
        // house numbers & cusp
        for(let h=1; h<=12; h++){
            let cuspAngle = ascendant + (h-1)*30;
            let radMid = (90 - (cuspAngle+15)) * Math.PI/180;
            let xLab = centerX + (R_houseLabels-8)*Math.cos(radMid);
            let yLab = centerY - (R_houseLabels-8)*Math.sin(radMid);
            svg += `<text x="${xLab}" y="${yLab}" fill="#cfb977" font-size="12" text-anchor="middle">${h}</text>`;
        }
        // Ascendant marker (big arrow)
        let ascRad = (90-ascendant)*Math.PI/180;
        let ascX = centerX + (R_out-20)*Math.cos(ascRad);
        let ascY = centerY - (R_out-20)*Math.sin(ascRad);
        svg += `<polygon points="${ascX-7},${ascY-4} ${ascX+7},${ascY-4} ${ascX},${ascY+10}" fill="#ffb347" stroke="#000" stroke-width="1"/>`;
        svg += `<text x="${centerX + (R_out+8)*Math.cos(ascRad)}" y="${centerY - (R_out+8)*Math.sin(ascRad)}" fill="#ffbc6e" font-size="11" font-weight="bold">Asc</text>`;
        
        // planets layered
        for(let p of planetPositions){
            let rad = (90 - p.lon) * Math.PI/180;
            let r_planet = radiusMap.get(p.name) || R_planetBase;
            let x = centerX + r_planet * Math.cos(rad);
            let y = centerY - r_planet * Math.sin(rad);
            let fillColor = "#FFD966";
            if(p.name==="Sun") fillColor="#ffaa33";
            if(p.name==="Moon") fillColor="#c0e0ff";
            svg += `<circle cx="${x}" cy="${y}" r="12" fill="#111" stroke="${fillColor}" stroke-width="1.5"/>`;
            svg += `<text x="${x}" y="${y+3}" fill="${fillColor}" font-size="15" text-anchor="middle" dominant-baseline="middle" font-weight="bold">${getPlanetSymbol(p.name)}</text>`;
        }
        svg += `<circle cx="${centerX}" cy="${centerY}" r="10" fill="#2f2a1f" stroke="#d4af37" stroke-width="1.5"/>`;
        svg += `<text x="${centerX}" y="${centerY+2}" fill="#ebc45a" font-size="11" text-anchor="middle">M</text>`;
        svg += `</svg>`;
        container.innerHTML = svg;
    }
    
    function getPlanetSymbol(name) {
        const map = { Sun:"☉", Moon:"☽", Mars:"♂", Mercury:"☿", Jupiter:"♃", Venus:"♀", Saturn:"♄", Rahu:"☊", Ketu:"☋" };
        return map[name] || "●";
    }
    
    // Side table with exact planetary coordinates
    function renderSideTable(planetsData, asc) {
        let html = `<table class="coord-table"><thead><tr><th>Planet</th><th>Longitude</th><th>Sign</th><th>House</th></tr></thead><tbody>`;
        for(let p of planetsData){
            let lonFixed = p.longitude.toFixed(2)+"°";
            html += `<tr><td class="planet-symbol">${getPlanetSymbol(p.name)} ${p.name}</td><td>${lonFixed}</td><td>${p.sign}</td><td>${p.house}</td></tr>`;
        }
        html += `<tr style="border-top:1px solid #d4af37;"><td>⭐ Ascendant</td><td>${asc.toFixed(2)}°</td><td>${getZodiacSign(asc)}</td><td>House 1</td></tr>`;
        html += `</tbody></table>`;
        document.getElementById('side-coords').innerHTML = html;
    }
    
    // Generate content for page 2-6 (keeping intact)
    function renderOtherPage(pageNum, birthDemo = new Date(1990,5,15)) {
        let content = "";
        const pd = getPlanetaryData();
        if(pageNum===2){
            let ls = getLoShuGridFromBirth(birthDemo);
            content = `<div style="padding:20px; background:#111a22; border-radius:1rem;"><h2>🔢 Lo Shu Grid</h2><p>Numerology Root: ${ls.root}</p><p>Grid essence: Magic Square 3x3, numbers 1-9 arranged.</p><pre style="color:#e0c87c">  4 9 2\n  3 5 7\n  8 1 6  (based on your birth)</pre><p>Life Path derived from birth date: ${ls.root}</p></div>`;
        } else if(pageNum===3){
            let kua = getKuaNumber("M",1990);
            let kab = getKabbalahReduction(42);
            content = `<div style="padding:20px;"><h2>🧘 Kua & Kabbalah</h2><p>Kua Number (Male, 1990): ${kua} – Feng Shui orientation</p><p>Kabbalah reduced number (example 42 -> ${kab}) : Spiritual vibration</p><p>Integration with planetary chart reveals hidden patterns.</p></div>`;
        } else if(pageNum===4){
            let kund = getKundaliniFiveNumbers(birthDemo);
            content = `<div style="padding:20px;"><h2>🌌 Kundalini Five Numbers</h2><p>Soul: ${kund.soul} | Karma: ${kund.karma} | Destiny: ${kund.destiny} | Path: ${kund.path} | Dharma: ${kund.dharma}</p><p>These five keys unlock pranic energy alignment.</p></div>`;
        } else if(pageNum===5){
            let naks = getNakshatra(pd.planetsData[0].longitude);
            content = `<div style="padding:20px;"><h2>✨ Nakshatra Finder</h2><p>Sun Nakshatra: ${naks}</p><p>Moon Nakshatra: ${getNakshatra(pd.planetsData[1].longitude)}</p><p>Ascendant Nakshatra: ${getNakshatra(pd.asc)}</p><p>Detailed star-lore and deity mapping integrated.</p></div>`;
        } else if(pageNum===6){
            let sunSign = getZodiacSign(pd.planetsData[0].longitude);
            content = `<div style="padding:20px;"><h2>📖 Dynamic Horoscope</h2><p>Current Sun in ${sunSign}. Cosmic energies: The planetary alignment suggests breakthrough in communication and emotional clarity.</p><p>Mars in ${getZodiacSign(pd.planetsData[2].longitude)} drives ambition. Jupiter aspects abundance.</p><p>Shivanetra V9 insight: trust the layered geometry of fate.</p></div>`;
        }
        return `<div class="chart-panel" style="flex:1;">${content}</div><div class="side-table" style="flex:0.4;"><h3>📡 Cosmic Snapshot</h3><p>Planetary positions active. Use main chart view for full graphic.</p></div>`;
    }
    
    // Main refresh: draws chart & table on page1
    let currentPage = 1;
    function refreshDisplay() {
        const pd = getPlanetaryData();
        const planets = pd.planetsData;
        const asc = pd.asc;
        if(currentPage === 1) {
            const mainHtml = `<div class="dashboard">
                <div class="chart-panel">
                    <div class="svg-container" id="svg-chart-holder"></div>
                </div>
                <div class="side-table">
                    <h3>⚡ EXACT PLANETARY COORDINATES ⚡</h3>
                    <div id="side-coords"></div>
                </div>
            </div>`;
            document.getElementById('contentRoot').innerHTML = mainHtml;
            renderCircularChart(planets, asc);
            renderSideTable(planets, asc);
        } else {
            document.getElementById('contentRoot').innerHTML = `<div class="dashboard">${renderOtherPage(currentPage)}</div>`;
        }
        document.getElementById('pageDisplay').innerText = `Page ${currentPage} / 6 : ${currentPage===1?"Circular Chart":(currentPage===2?"Lo Shu":(currentPage===3?"Kua/Kab":(currentPage===4?"Kundalini":(currentPage===5?"Nakshatra":"Horoscope"))))}`;
        document.querySelectorAll('.page-btn').forEach(btn => {
            if(parseInt(btn.dataset.page)===currentPage) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }
    
    function init() {
        refreshDisplay();
        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentPage = parseInt(btn.dataset.page);
                refreshDisplay();
            });
        });
    }
    init();
</script>
</body>
</html>
