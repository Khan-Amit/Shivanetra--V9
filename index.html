<script>
    // ============================================================
    // REAL PLANETARY CALCULATIONS (Accurate Approximations)
    // ============================================================
    const J2000 = 2451545.0;
    function getJulianDate() {
        return (new Date().getTime() / 86400000) + 2440587.5;
    }
    
    function getPlanetLongitude(planet, jd) {
        const T = (jd - J2000) / 36525.0;
        switch(planet) {
            case 'Sun': return (280.46646 + 36000.76983 * T) % 360;
            case 'Moon': return (218.3165 + 481267.8813 * T) % 360;
            case 'Mars': return (355.433 + 6890.174 * T) % 360;
            case 'Mercury': return (174.941 + 41520.790 * T) % 360;
            case 'Jupiter': return (34.351 + 1092.526 * T) % 360;
            case 'Venus': return (50.416 + 58517.814 * T) % 360;
            case 'Saturn': return (40.589 + 421.256 * T) % 360;
            case 'Rahu': return (125.044522 - 1934.136261 * T) % 360;
            case 'Ketu': return ((125.044522 - 1934.136261 * T) + 180) % 360;
            default: return 0;
        }
        if(planet === 'Rahu') return (125.044522 - 1934.136261 * T) % 360;
        if(planet === 'Ketu') return ((125.044522 - 1934.136261 * T) + 180) % 360;
        return 0;
    }

    function getAscendant(jd, lat=28.6139, lon=77.2090) {
        const T = (jd - J2000)/36525;
        let theta0 = 280.46061837 + 360.98564736629*(jd - 2451545.0);
        theta0 = theta0 % 360;
        const obl = 23.439291 - 0.013004*T;
        const lngSun = getPlanetLongitude('Sun', jd);
        const raSun = Math.atan2(Math.cos(obl*Math.PI/180)*Math.sin(lngSun*Math.PI/180), Math.cos(lngSun*Math.PI/180)) * 180/Math.PI;
        let raAdj = raSun < 0 ? raSun + 360 : raSun;
        const lst = (theta0 + lon) % 360;
        const hourAngle = lst - raAdj;
        let asc = Math.atan2(Math.sin(hourAngle*Math.PI/180), Math.cos(hourAngle*Math.PI/180)*Math.sin(obl*Math.PI/180) + Math.tan(lat*Math.PI/180)*Math.cos(obl*Math.PI/180)) * 180/Math.PI;
        if(asc < 0) asc += 360;
        return asc;
    }

    function getHouseFromLongitude(lon, asc) {
        let diff = (lon - asc + 360) % 360;
        return Math.floor(diff / 30) + 1;
    }

    function getZodiacSign(deg) {
        const signs = ["Aries ♈", "Taurus ♉", "Gemini ♊", "Cancer ♋", "Leo ♌", "Virgo ♍", "Libra ♎", "Scorpio ♏", "Sagittarius ♐", "Capricorn ♑", "Aquarius ♒", "Pisces ♓"];
        return signs[Math.floor(deg/30)%12];
    }

    function getZodiacSymbol(deg) {
        const sym = ["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
        return sym[Math.floor(deg/30)%12];
    }

    function getPlanetSymbol(name) {
        const map = { Sun:"☉", Moon:"☽", Mars:"♂", Mercury:"☿", Jupiter:"♃", Venus:"♀", Saturn:"♄", Rahu:"☊", Ketu:"☋" };
        return map[name] || "●";
    }

    function getNakshatra(deg) {
        const naks = ["Ashwini","Bharani","Krittika","Rohini","Mrigashira","Ardra","Punarvasu","Pushya","Ashlesha","Magha","Purva Phalguni","Uttara Phalguni","Hasta","Chitra","Swati","Vishakha","Anuradha","Jyeshtha","Mula","Purva Ashadha","Uttara Ashadha","Shravana","Dhanishtha","Shatabhisha","Purva Bhadrapada","Uttara Bhadrapada","Revati"];
        const idx = Math.floor(deg / (360/27));
        return naks[idx % 27];
    }

    function getPlanetaryData() {
        const jd = getJulianDate();
        const asc = getAscendant(jd);
        const planets = ['Sun','Moon','Mars','Mercury','Jupiter','Venus','Saturn','Rahu','Ketu'];
        let data = [];
        for(let p of planets) {
            let lon = getPlanetLongitude(p, jd);
            let house = getHouseFromLongitude(lon, asc);
            data.push({ name: p, longitude: lon, sign: getZodiacSign(lon), house: house });
        }
        return { asc, planetsData: data };
    }

    // Numerology Functions
    function getLifePathNumber(birthDate) {
        let d = birthDate.getDate();
        let m = birthDate.getMonth() + 1;
        let y = birthDate.getFullYear();
        let sum = d + m + y;
        while(sum > 9) sum = Math.floor(sum/10) + sum%10;
        return sum;
    }

    function getKuaNumber(year, gender="M") {
        let y = year % 100;
        let s = Math.floor(y/10) + y%10;
        while(s > 9) s = Math.floor(s/10) + s%10;
        let kua = gender === "M" ? (10 - s) : (5 + s);
        if(kua > 9) kua -= 9;
        return kua;
    }

    function getKabbalahNumber(num) {
        while(num > 9) num = Math.floor(num/10) + num%10;
        return num;
    }

    function getKundaliniFive(birthDate) {
        let d = birthDate.getDate();
        let m = birthDate.getMonth() + 1;
        let y = birthDate.getFullYear();
        let soul = d % 9 === 0 ? 9 : d % 9;
        let karma = m % 9 === 0 ? 9 : m % 9;
        let dest = d + m + y;
        while(dest > 9) dest = Math.floor(dest/10) + dest%10;
        let path = soul + karma + dest;
        while(path > 9) path = Math.floor(path/10) + path%10;
        let dharma = y % 9 === 0 ? 9 : y % 9;
        return { soul, karma, destiny: dest, path, dharma };
    }

    // Draw SVG Circular Chart
    function renderCircularChart(planetsData, ascendant) {
        const container = document.getElementById('svg-chart-holder');
        if(!container) return;
        const size = 580;
        const cx = size/2, cy = size/2;
        const R_out = 250;
        const R_base = 180;
        
        let svg = `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
        svg += `<circle cx="${cx}" cy="${cy}" r="${R_out+3}" fill="#05080f" stroke="#dbbf5e" stroke-width="2"/>`;
        
        // House lines
        for(let i=0;i<12;i++){
            let angle = 90 - (ascendant + i*30);
            let rad = angle * Math.PI/180;
            let x2 = cx + R_out * Math.cos(rad);
            let y2 = cy - R_out * Math.sin(rad);
            svg += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="#7a6535" stroke-width="1" stroke-dasharray="3 3"/>`;
        }
        
        // Degree ticks & Zodiac symbols
        for(let deg=0; deg<360; deg+=10){
            let rad = (90-deg)*Math.PI/180;
            let r1 = 230, r2 = 240;
            if(deg%30===0) r2 = 248;
            let x1 = cx + r1 * Math.cos(rad);
            let y1 = cy - r1 * Math.sin(rad);
            let x2 = cx + r2 * Math.cos(rad);
            let y2 = cy - r2 * Math.sin(rad);
            svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#b8963e" stroke-width="0.8"/>`;
            if(deg%30===0){
                let radLab = (90-deg-15)*Math.PI/180;
                let lx = cx + (R_out+5) * Math.cos(radLab);
                let ly = cy - (R_out+5) * Math.sin(radLab);
                svg += `<text x="${lx}" y="${ly}" fill="#efdb9b" font-size="13" text-anchor="middle">${getZodiacSymbol(deg)}</text>`;
            }
        }
        
        // House numbers
        for(let h=1;h<=12;h++){
            let angle = ascendant + (h-1)*30 + 15;
            let rad = (90-angle)*Math.PI/180;
            let x = cx + 205 * Math.cos(rad);
            let y = cy - 205 * Math.sin(rad);
            svg += `<text x="${x}" y="${y}" fill="#e7cf8a" font-size="12" text-anchor="middle" font-weight="bold">${h}</text>`;
        }
        
        // Ascendant marker
        let ascRad = (90-ascendant)*Math.PI/180;
        let ascX = cx + (R_out-18) * Math.cos(ascRad);
        let ascY = cy - (R_out-18) * Math.sin(ascRad);
        svg += `<polygon points="${ascX-6},${ascY-3} ${ascX+6},${ascY-3} ${ascX},${ascY+10}" fill="#ffb347"/>`;
        svg += `<text x="${cx + (R_out+8)*Math.cos(ascRad)}" y="${cy - (R_out+8)*Math.sin(ascRad)}" fill="#fdbf6e" font-size="10">ASC</text>`;
        
        // Planets
        for(let p of planetsData){
            let rad = (90 - p.longitude) * Math.PI/180;
            let x = cx + R_base * Math.cos(rad);
            let y = cy - R_base * Math.sin(rad);
            let color = p.name === 'Sun' ? '#f6b83e' : (p.name === 'Moon' ? '#bde0fe' : '#FFD966');
            svg += `<circle cx="${x}" cy="${y}" r="11" fill="#11161f" stroke="${color}" stroke-width="1.5"/>`;
            svg += `<text x="${x}" y="${y+2}" fill="${color}" font-size="14" text-anchor="middle" font-weight="bold">${getPlanetSymbol(p.name)}</text>`;
        }
        
        svg += `<circle cx="${cx}" cy="${cy}" r="10" fill="#2a2315" stroke="#e5bf60" stroke-width="1.5"/>`;
        svg += `<text x="${cx}" y="${cy+2}" fill="#ffeaac" font-size="11" text-anchor="middle">M</text>`;
        svg += `</svg>`;
        container.innerHTML = svg;
    }

    function renderSideTable(planetsData, asc) {
        let html = `<table class="coord-table"><thead><th>Planet</th><th>Longitude</th><th>Sign</th><th>House</th></thead><tbody>`;
        for(let p of planetsData){
            html += `<tr><td>${getPlanetSymbol(p.name)} ${p.name}</td><td>${p.longitude.toFixed(2)}°</td><td>${p.sign}</td><td>${p.house}</td></tr>`;
        }
        html += `<tr style="border-top:1px solid #c6a445;"><td>⭐ Ascendant</td><td>${asc.toFixed(2)}°</td><td>${getZodiacSign(asc)}</td><td>House 1</td></tr>`;
        html += `</tbody></table>`;
        document.getElementById('side-coords').innerHTML = html;
    }

    // Global state
    let currentPage = 1;
    let userBirthDate = null;
    let userName = "";
    let userPlace = "";

    function renderPage() {
        const astro = getPlanetaryData();
        
        if(currentPage === 1) {
            document.getElementById('dynamicContent').innerHTML = `
                <div class="dashboard">
                    <div class="chart-panel">
                        <div class="svg-container" id="svg-chart-holder"></div>
                    </div>
                    <div class="side-table">
                        <h3>⚡ EXACT PLANETARY COORDINATES ⚡</h3>
                        <div id="side-coords"></div>
                        <p style="font-size:0.7rem; margin-top:12px;">Real-time calculations | Conjunction handling</p>
                    </div>
                </div>
            `;
            renderCircularChart(astro.planetsData, astro.asc);
            renderSideTable(astro.planetsData, astro.asc);
        } 
        else if(currentPage === 2) {
            let lp = userBirthDate ? getLifePathNumber(userBirthDate) : 5;
            document.getElementById('dynamicContent').innerHTML = `
                <div class="page-content">
                    <h2>🔢 Lo Shu Grid & Numerology</h2>
                    <div class="info-grid">
                        <div class="info-card"><strong>Life Path Number:</strong> ${lp}</div>
                        <div class="info-card"><strong>Lo Shu Grid:</strong><br>4 9 2<br>3 5 7<br>8 1 6</div>
                        <div class="info-card"><strong>Birth Date:</strong> ${userBirthDate ? userBirthDate.toDateString() : 'Not set'}</div>
                    </div>
                </div>
            `;
        }
        else if(currentPage === 3) {
            let year = userBirthDate ? userBirthDate.getFullYear() : 1990;
            let kua = getKuaNumber(year, "M");
            let kab = getKabbalahNumber(42);
            document.getElementById('dynamicContent').innerHTML = `
                <div class="page-content">
                    <h2>🧘 Kua & Kabbalah</h2>
                    <div class="info-grid">
                        <div class="info-card"><strong>Kua Number:</strong> ${kua} (Feng Shui direction)</div>
                        <div class="info-card"><strong>Kabbalah Reduction:</strong> ${kab}</div>
                        <div class="info-card"><strong>Element:</strong> ${['Wood','Fire','Earth','Metal','Water'][kua%5]}</div>
                    </div>
                </div>
            `;
        }
        else if(currentPage === 4) {
            let k5 = userBirthDate ? getKundaliniFive(userBirthDate) : { soul:5, karma:3, destiny:7, path:6, dharma:4 };
            document.getElementById('dynamicContent').innerHTML = `
                <div class="page-content">
                    <h2>🌌 Kundalini Five Numbers</h2>
                    <div class="info-grid">
                        <div class="info-card"><strong>Soul:</strong> ${k5.soul}</div>
                        <div class="info-card"><strong>Karma:</strong> ${k5.karma}</div>
                        <div class="info-card"><strong>Destiny:</strong> ${k5.destiny}</div>
                        <div class="info-card"><strong>Path:</strong> ${k5.path}</div>
                        <div class="info-card"><strong>Dharma:</strong> ${k5.dharma}</div>
                    </div>
                </div>
            `;
        }
        else if(currentPage === 5) {
            let sunNak = getNakshatra(astro.planetsData[0].longitude);
            let moonNak = getNakshatra(astro.planetsData[1].longitude);
            let ascNak = getNakshatra(astro.asc);
            document.getElementById('dynamicContent').innerHTML = `
                <div class="page-content">
                    <h2>✨ Nakshatra Finder (Lunar Mansions)</h2>
                    <div class="info-grid">
                        <div class="info-card"><strong>Sun Nakshatra:</strong> ${sunNak}</div>
                        <div class="info-card"><strong>Moon Nakshatra:</strong> ${moonNak}</div>
                        <div class="info-card"><strong>Ascendant Nakshatra:</strong> ${ascNak}</div>
                    </div>
                </div>
            `;
        }
        else if(currentPage === 6) {
            let sunSign = getZodiacSign(astro.planetsData[0].longitude);
            document.getElementById('dynamicContent').innerHTML = `
                <div class="page-content">
                    <h2>📖 Dynamic Horoscope</h2>
                    <div class="info-grid">
                        <div class="info-card"><strong>Current Sun:</strong> ${sunSign}</div>
                        <div class="info-card"><strong>Prediction:</strong> The cosmic alignment brings clarity and transformation. Trust your intuition.</div>
                        <div class="info-card"><strong>Remedy:</strong> Meditate on ${astro.planetsData[2].name} energy for strength.</div>
                    </div>
                </div>
            `;
        }
        
        document.getElementById('pageIndicator').innerHTML = `Page ${currentPage} / 6`;
        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.classList.toggle('active', parseInt(btn.dataset.page) === currentPage);
        });
    }

    // Download chart as HTML
    function downloadFullChart() {
        const htmlContent = document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `MARDUKH_Chart_${userName || 'User'}_${new Date().toISOString().slice(0,10)}.html`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        alert("Chart downloaded successfully!");
    }

    // Initialize app after landing
    function initApp() {
        document.getElementById('landingPage').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('displayUserName').innerHTML = `${userName} | ${userBirthDate ? userBirthDate.toLocaleDateString() : ''}`;
        renderPage();
    }

    // Event Listeners
    document.getElementById('enterAppBtn').addEventListener('click', () => {
        let day = parseInt(document.getElementById('birthDay').value);
        let month = parseInt(document.getElementById('birthMonth').value);
        let year = parseInt(document.getElementById('birthYear').value);
        let name = document.getElementById('userName').value;
        let place = document.getElementById('birthPlace').value;
        
        if(!day || !month || !year || !name) {
            alert("Please fill all birth details!");
            return;
        }
        userName = name;
        userPlace = place;
        userBirthDate = new Date(year, month-1, day);
        initApp();
    });

    document.getElementById('changeUserBtn').addEventListener('click', () => {
        document.getElementById('landingPage').style.display = 'block';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('userName').value = '';
    });

    document.querySelectorAll('.page-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            currentPage = parseInt(btn.dataset.page);
            renderPage();
        });
    });

    document.getElementById('downloadChartBtn').addEventListener('click', downloadFullChart);
</script>
</body>
</html>
